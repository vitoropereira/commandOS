supplementary_context:
  - topic: "Confirmação da aprovação das 14 resoluções e data exata"
    finding: "Confirmado: TSE concluiu o julgamento das 14 resoluções em 2 de março de 2026. O pacote foi aprovado em duas sessões — 7 resoluções em fevereiro e 7 concluídas na sessão extraordinária de 2 de março."
    source: "CNN Brasil — https://www.cnnbrasil.com.br/eleicoes/tse-conclui-julgamento-de-resolucoes-para-as-eleicoes-de-2026/"

  - topic: "Confirmação de que conteúdo rotulado como IA também está proibido no blackout"
    finding: "Confirmado: a proibição abrange publicação, republicação ou impulsionamento de novos conteúdos produzidos ou alterados por IA — inclusive os devidamente identificados. O label de IA não isenta da proibição durante o blackout de 72h + 24h."
    source: "InfoSAJ / Tribuna do Sertão — https://infosaj.com.br/eleicoes-2026-regras-barram-ia-tres-dias-antes-da-votacao-e-proibem-plataformas-de-sugerir-candidatos/"

  - topic: "Escopo real da proibição de IA em recomendações de candidatos nas plataformas"
    finding: "Confirmado: algoritmos de recomendação de plataformas (feeds, sugestões, chatbots) ficam proibidos de ranquear, sugerir ou priorizar candidaturas, partidos ou coligações — incluindo formas indiretas de favorecimento ou desfavorecimento político-eleitoral."
    source: "Poder360 — https://www.poder360.com.br/poder-eleicoes/tse-proibe-que-ia-recomende-candidatos-a-eleitores/"

  - topic: "Responsabilidade solidária das plataformas — mecanismo real"
    finding: "Confirmado: plataformas que não removerem, de forma imediata, conteúdos sintéticos irregulares após notificação da Justiça Eleitoral respondem solidariamente. Devem também remover conteúdo idêntico ao de decisões anteriores sem necessidade de nova reanálise judicial."
    source: "CNN Brasil / Contec Brasil — https://contec.org.br/de-identificacao-obrigatoria-a-responsabilizacao-de-plataformas-veja-o-que-muda-no-uso-de-ia-para-as-eleicoes-2026/"
